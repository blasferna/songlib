{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{setlist.title}}</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            margin: 0;
            padding: 20px;
            color: #1a1a1a;
        }
        .print-header {
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #333;
        }
        .print-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .print-header p {
            font-size: 13px;
            color: #555;
            margin: 0;
        }
        .song-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            margin: 18px 0 4px;
            padding-bottom: 2px;
            border-bottom: 1px solid #ccc;
        }
        .song-title:first-child {
            margin-top: 0;
        }
        .song {
            font-size: inherit;
            line-height: 1.45;
            margin: 0;
        }
        .content {
            column-count: 2;
            column-gap: 30px;
        }
        @page {
            margin: 15mm;
        }
    </style>
</head>
<body>
    <div class="print-header">
        <h1>{{ setlist.title }}</h1>
        <p>{{ setlist.date }}</p>
    </div>
    
    <div class="content">
    {% for song in songs %}
    <h3 class="song-title">{{ song.obj.order }}. {{ song.obj.song.title }} — {{ song.obj.chord }}</h3>
    <pre class="song" style="white-space: pre-wrap; font-family: inherit; font-size: {{ song.obj.font_size }}px;">{{ song.plain_lyrics }}</pre>
    {% endfor %}
    </div>
</body>
</html>
